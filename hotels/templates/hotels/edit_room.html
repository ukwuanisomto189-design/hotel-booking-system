<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Room — StayEase</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { font-family: 'Poppins', sans-serif; }
        body { background: linear-gradient(135deg, #0f2027, #203a43, #2c5364); min-height: 100vh; }
        .navbar { background: rgba(255,255,255,0.05); backdrop-filter: blur(10px); padding: 1rem 2rem; border-bottom: 1px solid rgba(255,255,255,0.1); }
        .navbar-brand { font-size: 1.5rem; font-weight: 700; color: white !important; }
        .form-card { background: white; border-radius: 20px; box-shadow: 0 25px 60px rgba(0,0,0,0.3); overflow: hidden; }
        .form-card-top { background: linear-gradient(135deg, #78350f, #d97706); padding: 2rem; color: white; }
        .form-card-top h4 { font-weight: 700; margin-bottom: 0; }
        .form-card-body { padding: 2rem; }
        .form-control { border-radius: 8px; border: 1px solid #e0e0e0; padding: 10px 15px; }
        .form-control:focus { box-shadow: 0 0 0 3px rgba(217,119,6,0.2); border-color: #d97706; }
        .btn-save { background: linear-gradient(to right, #78350f, #d97706); color: white; border: none; border-radius: 10px; padding: 12px; font-weight: 600; width: 100%; }
        .btn-save:hover { opacity: 0.9; color: white; }
        label { font-weight: 600; font-size: 0.85rem; color: #444; text-transform: uppercase; letter-spacing: 0.5px; }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg">
        <div class="container">
            <a class="navbar-brand" href="/"><i class="fas fa-bed me-2"></i>StayEase</a>
            <a href="/hotels/{{ room.hotel.id }}/" class="btn btn-outline-light btn-sm ms-auto"><i class="fas fa-arrow-left me-1"></i> Back</a>
        </div>
    </nav>

    <div class="container py-5">
        <div class="row justify-content-center">
            <div class="col-12 col-md-7 col-lg-6">
                <div class="form-card">
                    <div class="form-card-top">
                        <i class="fas fa-edit me-2"></i>
                        <h4 class="d-inline">Edit Room {{ room.room_number }}</h4>
                        <p class="opacity-75 small mt-1 mb-0">{{ room.hotel.name }}</p>
                    </div>
                    <div class="form-card-body">
                        <form method="post">
                            {% csrf_token %}
                            {{ form.as_p }}
                            <button type="submit" class="btn btn-save mt-3">
                                <i class="fas fa-save me-2"></i>Save Changes
                            </button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
