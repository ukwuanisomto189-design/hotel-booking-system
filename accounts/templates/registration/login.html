<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login — StayEase</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { font-family: 'Poppins', sans-serif; }
        body { background: linear-gradient(135deg, #0f2027, #203a43, #2c5364); min-height: 100vh; }
        .card { border: none; border-radius: 20px; box-shadow: 0 25px 60px rgba(0,0,0,0.3); overflow: hidden; }
        .card-top { background: linear-gradient(135deg, #0f2027, #2c5364); padding: 2.5rem; color: white; text-align: center; }
        .card-top h4 { font-weight: 700; }
        .card-body { padding: 2rem; }
        .form-control { border-radius: 8px; border: 1px solid #e0e0e0; padding: 10px 15px; }
        .form-control:focus { box-shadow: 0 0 0 3px rgba(44,83,100,0.2); border-color: #2c5364; }
        .btn-login { background: linear-gradient(to right, #0f2027, #2c5364); color: white; border: none; border-radius: 10px; padding: 12px; font-weight: 600; width: 100%; }
        .btn-login:hover { opacity: 0.9; color: white; }
        label { font-weight: 600; font-size: 0.85rem; color: #444; text-transform: uppercase; letter-spacing: 0.5px; }
    </style>
</head>
<body class="d-flex align-items-center justify-content-center py-5">
    <div class="container px-3">
        <div class="row justify-content-center">
            <div class="col-12 col-sm-10 col-md-6 col-lg-5">
                <div class="card">
                    <div class="card-top">
                        <i class="fas fa-bed mb-3" style="font-size: 2.5rem;"></i>
                        <h4>Welcome Back!</h4>
                        <p class="opacity-75 small mb-0">Login to book your perfect stay</p>
                    </div>
                    <div class="card-body">
                        <form method="post">
                            {% csrf_token %}
                            {{ form.as_p }}
                            <button type="submit" class="btn btn-login mt-3">
                                <i class="fas fa-sign-in-alt me-2"></i>Login
                            </button>
                        </form>
                    </div>
                </div>
                <div class="text-center mt-3">
                    <a href="/accounts/register/" class="text-white-50 small">Don't have an account? Register</a>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
